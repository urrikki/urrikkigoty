<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GOTY Tier List</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="main-header">
            <div class="header-inner">
                <div class="logo-area">
                    <h1 class="site-title" id="siteTitle">GOTY<span class="title-accent">.</span></h1>
                    <p class="site-subtitle">Tier List</p>
                </div>
                <div class="action-buttons">
                    <button class="icon-btn" id="filterBtn" title="Filtres"><i class="fas fa-sliders-h"></i></button>
                    <button class="icon-btn" id="statsBtn" title="Statistiques"><i class="fas fa-chart-bar"></i></button>
                    <button class="icon-btn" id="randomGameBtn" title="Jeu aléatoire"><i class="fas fa-dice-d6"></i></button>
                    <button class="icon-btn" id="compareBtn" title="Comparaison"><i class="fas fa-balance-scale"></i></button>
                    <button class="icon-btn" id="themeToggle" title="Thème"><i class="fas fa-moon"></i></button>
                    <button class="icon-btn" id="favoritesBtn" title="Favoris"><i class="far fa-heart"></i></button>
                </div>
            </div>
            <div class="admin-badge" id="adminBadge" style="display: none;">
                <i class="fas fa-tools"></i> Mode Admin actif
            </div>
        </header>

        <!-- View Toggle -->
        <div class="view-toggle-bar">
            <div class="view-toggle-group">
                <button class="view-btn active" data-view="tierlist"><i class="fas fa-list"></i> Tier List</button>
                <button class="view-btn" data-view="timeline"><i class="fas fa-clock"></i> Timeline</button>
                <button class="view-btn" data-view="gallery"><i class="fas fa-th-large"></i> Galerie</button>
            </div>
            <span class="game-count" id="gameCount">0 jeux</span>
        </div>

        <!-- Filter Panel -->
        <div class="panel filter-panel" id="filterPanel" style="display: none;">
            <div class="panel-header">
                <h3><i class="fas fa-search"></i> Affiner la recherche</h3>
                <button class="panel-close" id="closeFilterPanel"><i class="fas fa-times"></i></button>
            </div>
            <div class="panel-body">
                <div class="filter-grid">
                    <div class="filter-group">
                        <label><i class="fas fa-gamepad"></i> Nom du jeu</label>
                        <input type="text" id="searchInput" placeholder="Rechercher...">
                    </div>
                    <div class="filter-group">
                        <label><i class="fas fa-calendar-alt"></i> Année</label>
                        <select id="yearFilter"><option value="">Toutes</option></select>
                    </div>
                    <div class="filter-group">
                        <label><i class="fas fa-trophy"></i> Tier</label>
                        <select id="tierFilter">
                            <option value="">Tous</option>
                            <option value="S">S</option><option value="A">A</option>
                            <option value="B">B</option><option value="C">C</option>
                            <option value="D">D</option><option value="E">E</option>
                            <option value="F">F</option><option value="NP">NP</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label><i class="fas fa-sort"></i> Trier par</label>
                        <select id="sortBy">
                            <option value="default">Par défaut</option>
                            <option value="name">Nom A→Z</option>
                            <option value="year">Année récente</option>
                        </select>
                    </div>
                </div>
                <div class="filter-actions">
                    <button class="btn-secondary" id="resetFilters"><i class="fas fa-undo-alt"></i> Réinitialiser</button>
                </div>
            </div>
        </div>

        <!-- Stats Panel -->
        <div class="panel stats-panel" id="statsPanel" style="display: none;">
            <div class="panel-header">
                <h3><i class="fas fa-chart-line"></i> Statistiques</h3>
                <button class="panel-close" id="closeStatsPanel"><i class="fas fa-times"></i></button>
            </div>
            <div class="panel-body">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="totalGames">0</div><div class="stat-label"><i class="fas fa-database"></i> Jeux analysés</div></div>
                    <div class="stat-card"><div class="stat-value" id="latestYear">0</div><div class="stat-label"><i class="fas fa-calendar-check"></i> Année max</div></div>
                    <div class="stat-card"><div class="stat-value" id="latestGame">—</div><div class="stat-label"><i class="fas fa-clock"></i> Dernier ajout</div></div>
                </div>
                <div class="charts-row">
                    <div class="chart-container"><h4>Répartition par tier</h4><div id="tierChart" class="tier-chart"></div></div>
                    <div class="chart-container"><h4>Jeux par année</h4><div id="yearChart" class="tier-chart"></div></div>
                </div>
            </div>
        </div>

        <!-- Admin Controls -->
        <div class="admin-controls" id="adminControls" style="display: none;">
            <button class="admin-btn" id="addGameBtn"><i class="fas fa-plus-circle"></i> Ajouter</button>
            <button class="admin-btn" id="exportDataBtn"><i class="fas fa-download"></i> Exporter</button>
            <button class="admin-btn danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Quitter</button>
        </div>

        <!-- Tier List View -->
        <div class="tier-list-container" id="tierListView">
            <div class="tier-list" id="tierList"></div>
        </div>

        <!-- Timeline View -->
        <div class="timeline-container" id="timelineView" style="display: none;"></div>

        <!-- Gallery View -->
        <div class="gallery-container" id="galleryView" style="display: inline-flex;"></div>

        <!-- Game Modal -->
        <div class="modal" id="gameModal">
            <div class="modal-content">
                <button class="modal-close" id="closeGameModal"><i class="fas fa-times"></i></button>
                <div class="modal-body">
                    <img class="modal-image" id="modalImage" src="" alt="">
                    <div class="modal-info">
                        <h2 class="modal-title" id="modalTitle"></h2>
                        <div class="modal-meta">
                            <span class="modal-tag" id="modalYear"><i class="far fa-calendar-alt"></i></span>
                            <span class="modal-tag" id="modalTier"><i class="fas fa-trophy"></i></span>
                        </div>
                        <div class="modal-review-wrapper"><p class="modal-review" id="modalReview"></p></div>
                        <div class="modal-actions">
                            <button class="modal-edit-btn" id="modalEditBtn" style="display: none;"><i class="fas fa-edit"></i> Modifier</button>
                            <button class="fav-btn" id="toggleFavorite"><i class="far fa-heart"></i> Ajouter aux favoris</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Comparison Modal -->
        <div class="modal" id="comparisonModal">
            <div class="modal-content comparison-modal">
                <button class="modal-close" id="closeComparison"><i class="fas fa-times"></i></button>
                <h2 class="modal-title"><i class="fas fa-balance-scale"></i> Comparaison directe</h2>
                <div class="comparison-container" id="comparisonContainer"></div>
            </div>
        </div>

        <!-- Add/Edit Game Modal -->
        <div class="modal" id="addGameModal">
            <div class="modal-content add-game-modal">
                <button class="modal-close" id="closeAddModal"><i class="fas fa-times"></i></button>
                <h2 class="modal-title" id="addGameModalTitle"><i class="fas fa-plus-circle"></i> Ajouter un jeu</h2>
                <form id="addGameForm" class="add-game-form">
                    <div class="form-row">
                        <div class="form-group"><label>Nom *</label><input type="text" id="gameName" required></div>
                        <div class="form-group"><label>Année *</label><input type="number" id="gameYear" min="1950" max="2030" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Tier *</label>
                            <select id="gameRank" required>
                                <option value="S">S</option><option value="A">A</option><option value="B">B</option>
                                <option value="C">C</option><option value="D">D</option><option value="E">E</option>
                                <option value="F">F</option><option value="NP">NP</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Image URL *</label><input type="text" id="gamePicture" required></div>
                    </div>
                    <div class="form-group"><label>Review *</label><textarea id="gameReview" rows="4" required></textarea></div>
                    <div class="form-actions">
                        <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Enregistrer</button>
                        <button type="button" class="btn-cancel" id="cancelAddGame"><i class="fas fa-ban"></i> Annuler</button>
                        <button type="button" class="btn-delete" id="deleteGameBtn" style="display: none;"><i class="fas fa-trash-alt"></i> Supprimer</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Login Modal -->
        <div class="modal" id="loginModal">
            <div class="modal-content login-modal">
                <button class="modal-close" id="closeLogin"><i class="fas fa-times"></i></button>
                <h2><i class="fas fa-lock"></i> Accès administrateur</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" id="loginPassword" required autocomplete="off">
                        <div class="form-error" id="loginError"></div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-submit"><i class="fas fa-sign-in-alt"></i> Connexion</button>
                    </div>
                </form>
                <p class="login-hint">Triple-cliquez sur « GOTY » pour ouvrir cette fenêtre.</p>
            </div>
        </div>
    </div>

    <script src="scripts/index.js"></script>
</body>
</html>
